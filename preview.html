<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>XSLT Preview Viewer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #e5e7eb;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        iframe {
            width: 450px;
            height: 800px;
            border: none;
            background: transparent;
        }

        .controls {
            margin-bottom: 2rem;
            text-align: center;
            max-width: 600px;
        }

        h1 {
            margin-bottom: 0.5rem;
            color: #111827;
        }

        p {
            color: #4b5563;
            line-height: 1.5;
        }

        code {
            background: #d1d5db;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9em;
        }
    </style>
</head>

<body>
    <div class="controls">
        <h1>XML/XSLT Native Engine Proof of Concept</h1>
        <p>This iframe loads <code>ui.xml</code>, which is automatically styled into HTML by the browser natively using
            <code>ui-renderer.xslt</code> via the <code>&lt;?xml-stylesheet?&gt;</code> directive.</p>
    </div>
    <!-- Use ui.xml directly -->
    <iframe src="./ui.xml"></iframe>
</body>

</html>
